{{ $name := .Get "name" | default "ほいくまま" }}
{{ $icon := .Get "icon" | default "🌸" }}
{{ $img := .Get "img" }}
<div class="speech-wrap">
  <div class="speech-icon">
    {{ if $img }}
      <img src="{{ $img }}" alt="{{ $name }}" class="speech-img">
    {{ else }}
      {{ $icon }}
    {{ end }}
  </div>
  <div class="speech-bubble">
    <div class="speech-name">{{ $name }}</div>
    <div>{{ .Inner | markdownify }}</div>
  </div>
</div>
